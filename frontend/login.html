<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOLE  Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --fg: #f0ece4;
    --accent: #e8ff47;
    --accent2: #ff4d2e;
    --muted: #5a5850;
    --card-bg: #111110;
    --border: rgba(240,236,228,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  #cursor.hover { width: 40px; height: 40px; background: var(--fg); }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9998;
    opacity: 0.4;
  }

  .auth-container {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px;
    z-index: 10;
    position: relative;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .auth-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--fg);
    text-decoration: none;
    display: block;
    margin-bottom: 20px;
  }

  .auth-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .auth-subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .form-input {
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--fg);
    padding: 12px 16px;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232, 255, 71, 0.1);
  }

  .form-input::placeholder {
    color: var(--muted);
    opacity: 0.5;
  }

  .submit-btn {
    background: var(--accent);
    color: #080808;
    border: none;
    padding: 14px;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
  }

  .submit-btn:hover {
    transform: scale(1.02);
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  .auth-toggle {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: var(--muted);
  }

  .auth-toggle a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
    cursor: pointer;
  }

  .auth-toggle a:hover {
    opacity: 0.8;
  }

  .error-message {
    background: rgba(255, 77, 46, 0.1);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 12px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
  }

  .error-message.show {
    display: block;
  }

  .success-message {
    background: rgba(232, 255, 71, 0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
  }

  .success-message.show {
    display: block;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .back-link:hover {
    opacity: 0.8;
  }

  @media (max-width: 600px) {
    .auth-container {
      padding: 32px 24px;
    }

    .auth-logo {
      font-size: 36px;
    }

    .auth-title {
      font-size: 24px;
    }
  }

    .hamburger { display: none; background: none; border: none; color: var(--fg, #f0ece4); font-size: 28px; cursor: pointer; }
  @media (max-width: 900px) {
    nav { padding: 16px 24px; flex-direction: row; justify-content: space-between; align-items: center; background: rgba(8,8,8,0.95); backdrop-filter: blur(10px); z-index: 1000; position: fixed; width: 100%; top: 0; }
    .hamburger { display: block; }
    .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(8,8,8,0.98); padding: 24px; flex-direction: column; gap: 20px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .nav-links.active { display: flex; }
    .nav-links li { width: 100%; text-align: center; }
    .nav-links a { font-size: 16px; padding: 10px; display: block; }
    
    #hero { flex-direction: column; justify-content: flex-start; height: auto; min-height: 100vh; padding-top: 100px; }
    .hero-content { margin-top: 0; padding: 0 24px; width: 100%; text-align: center; order: 1; }
    .hero-eyebrow { justify-content: center; }
    #hero-canvas { position: relative; height: 50vh; width: 100%; inset: auto; margin-top: auto; order: 2; }
    
    #feature { flex-direction: column; justify-content: flex-start; height: auto; min-height: 100vh; padding-top: 80px; }
    .feature-content { padding: 0 24px; width: 100%; text-align: center; margin-bottom: 20px; order: 1; }
    .feature-content p { margin: 20px auto; }
    #feature-canvas { position: relative; height: 50vh; width: 100%; inset: auto; order: 2; }

    .main-container, .collection-container, .cart-container { padding: 0 24px; margin-top: 100px; }
    .admin-container { grid-template-columns: 1fr; }
    .auth-card { padding: 32px 24px; }
  }

  nav.scrolled {
    background: rgba(8, 8, 8, 0.95);
    backdrop-filter: blur(10px);
    mix-blend-mode: normal;
    
    transition: all 0.3s ease;
  }
</style>
<link rel="stylesheet" href="styles/responsive.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e8ff47'/><text x='50' y='70' font-family='Arial' font-weight='bold' font-size='60' text-anchor='middle' fill='%23080808'>S</text></svg>">
</head>
<body>

<div id="cursor"></div>

<div class="auth-container">
  <a href="index.html" class="back-link"> Back to Home</a>
  
  <div class="auth-header">
    <a href="index.html" class="auth-logo">SOLE</a>
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">Access your SOLE account</p>
  </div>

  <div class="error-message" id="error-msg"></div>
  <div class="success-message" id="success-msg"></div>

  <form class="auth-form" id="login-form">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" required/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="" required/>
    </div>

    <button class="submit-btn" type="submit">Login</button>
  </form>

  <div class="auth-toggle">
    Don't have an account? <a href="signup.html">Sign up here</a>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // Cursor animation
  const cursor = document.getElementById('cursor');
  let mx = 0, my = 0, cx = 0, cy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  document.addEventListener('mouseover', e => {
  if (e.target.closest('a, button, .product-card, .hero-cta, .color-swatch, .selector-btn, .carousel-btn, .wishlist-btn, .thumb, .review-card, .related-card-btn, .remove-btn, .checkout-btn, .continue-shop, .admin-sidebar li, .tab-btn, [onclick]')) {
    if (cursor) cursor.classList.add('hover');
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('a, button, .product-card, .hero-cta, .color-swatch, .selector-btn, .carousel-btn, .wishlist-btn, .thumb, .review-card, .related-card-btn, .remove-btn, .checkout-btn, .continue-shop, .admin-sidebar li, .tab-btn, [onclick]')) {
    if (cursor) cursor.classList.remove('hover');
  }
});
  (function animCursor() {
    cx += (mx - cx) * 0.15;
    cy += (my - cy) * 0.15;
    cursor.style.left = cx + 'px';
    cursor.style.top = cy + 'px';
    requestAnimationFrame(animCursor);
  })();

  // Form handling
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const result = await auth.login(email, password);
    
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');
    
    if (result.success) {
      successMsg.textContent = result.message;
      successMsg.classList.add('show');
      setTimeout(() => {
        window.location.href = 'account.html';
      }, 1500);
    } else {
      errorMsg.textContent = result.message;
      errorMsg.classList.add('show');
    }
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.querySelector('nav');
    const navLinks = document.querySelector('.nav-links');
    if (nav && navLinks && !document.querySelector('.hamburger')) {
      const btn = document.createElement('button');
      btn.className = 'hamburger';
      btn.innerHTML = '☰';
      nav.insertBefore(btn, navLinks);
      btn.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        nav.classList.toggle('menu-open');
      });
    }
  });
</script>


<script>
  window.addEventListener('scroll', () => {
    const nav = document.querySelector('nav');
    if (nav) {
      if (window.scrollY > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    }
  });
</script>
</body>
</html>
